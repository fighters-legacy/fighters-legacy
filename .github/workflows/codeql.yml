name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake \
            libx11-dev libxext-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxss-dev libxfixes-dev libxrender-dev libxinerama-dev libxxf86vm-dev libxkbcommon-dev \
            libopenal-dev libvulkan-dev glslang-tools

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/debug/_deps
          key: cmake-deps-ubuntu-latest-debug-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: cmake-deps-ubuntu-latest-debug-

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - uses: github/codeql-action/analyze@v4
